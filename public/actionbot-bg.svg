<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="50%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e85d04" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e85d04" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow3" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="nodeGlow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e85d04" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#e85d04" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeGlow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeGlow4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Base background -->
  <rect width="1440" height="900" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.5"/>
    </pattern>
    <rect width="1440" height="900" fill="url(#grid)"/>
  </g>

  <!-- Large ambient glows -->
  <ellipse cx="250" cy="200" rx="400" ry="300" fill="url(#glow1)"/>
  <ellipse cx="1100" cy="300" rx="350" ry="280" fill="url(#glow2)"/>
  <ellipse cx="720" cy="700" rx="500" ry="200" fill="url(#glow3)"/>

  <!-- === CONNECTION LINES (behind nodes) === -->
  <g stroke-width="1.5" fill="none" opacity="0.3">
    <!-- Data flow lines - curved paths between nodes -->
    <path d="M 280 180 Q 400 140 500 200" stroke="#e85d04" stroke-dasharray="6,4">
      <animate attributeName="stroke-dashoffset" from="20" to="0" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M 500 200 Q 620 260 700 220" stroke="#3b82f6" stroke-dasharray="6,4">
      <animate attributeName="stroke-dashoffset" from="20" to="0" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M 700 220 Q 800 180 900 250" stroke="#22c55e" stroke-dasharray="6,4">
      <animate attributeName="stroke-dashoffset" from="20" to="0" dur="1.8s" repeatCount="indefinite"/>
    </path>
    <path d="M 900 250 Q 1020 320 1100 280" stroke="#a855f7" stroke-dasharray="6,4">
      <animate attributeName="stroke-dashoffset" from="20" to="0" dur="2.2s" repeatCount="indefinite"/>
    </path>

    <!-- Vertical connections -->
    <path d="M 400 380 Q 450 480 400 580" stroke="#3b82f6" stroke-dasharray="6,4">
      <animate attributeName="stroke-dashoffset" from="20" to="0" dur="2.8s" repeatCount="indefinite"/>
    </path>
    <path d="M 700 380 Q 740 480 700 580" stroke="#e85d04" stroke-dasharray="6,4">
      <animate attributeName="stroke-dashoffset" from="20" to="0" dur="2.3s" repeatCount="indefinite"/>
    </path>
    <path d="M 1000 380 Q 950 480 1000 580" stroke="#22c55e" stroke-dasharray="6,4">
      <animate attributeName="stroke-dashoffset" from="20" to="0" dur="2.6s" repeatCount="indefinite"/>
    </path>

    <!-- Cross connections -->
    <path d="M 500 200 Q 600 400 700 380" stroke="#a855f7" stroke-dasharray="6,4">
      <animate attributeName="stroke-dashoffset" from="20" to="0" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M 700 220 Q 600 400 500 380" stroke="#e85d04" stroke-dasharray="6,4">
      <animate attributeName="stroke-dashoffset" from="20" to="0" dur="2.7s" repeatCount="indefinite"/>
    </path>
    <path d="M 900 250 Q 800 400 700 380" stroke="#3b82f6" stroke-dasharray="6,4">
      <animate attributeName="stroke-dashoffset" from="20" to="0" dur="2.4s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- === TOP ROW: INTEGRATION NODES === -->
  <!-- Telegram -->
  <g filter="url(#softGlow)" transform="translate(260, 160)">
    <circle cx="20" cy="20" r="20" fill="url(#nodeGlow3)" opacity="0.15"/>
    <circle cx="20" cy="20" r="16" fill="#1a1a2e" stroke="#22c55e" stroke-width="1.5"/>
    <text x="20" y="25" text-anchor="middle" fill="#22c55e" font-size="14">✈️</text>
  </g>

  <!-- Slack -->
  <g filter="url(#softGlow)" transform="translate(480, 180)">
    <circle cx="20" cy="20" r="20" fill="url(#nodeGlow4)" opacity="0.15"/>
    <circle cx="20" cy="20" r="16" fill="#1a1a2e" stroke="#a855f7" stroke-width="1.5"/>
    <text x="20" y="25" text-anchor="middle" fill="#a855f7" font-size="14">#️⃣</text>
  </g>

  <!-- WhatsApp -->
  <g filter="url(#softGlow)" transform="translate(680, 200)">
    <circle cx="20" cy="20" r="20" fill="url(#nodeGlow3)" opacity="0.15"/>
    <circle cx="20" cy="20" r="16" fill="#1a1a2e" stroke="#22c55e" stroke-width="1.5"/>
    <text x="20" y="25" text-anchor="middle" fill="#22c55e" font-size="14">💬</text>
  </g>

  <!-- Web Widget -->
  <g filter="url(#softGlow)" transform="translate(880, 230)">
    <circle cx="20" cy="20" r="20" fill="url(#nodeGlow2)" opacity="0.15"/>
    <circle cx="20" cy="20" r="16" fill="#1a1a2e" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="20" y="25" text-anchor="middle" fill="#3b82f6" font-size="14">🌐</text>
  </g>

  <!-- Webhook -->
  <g filter="url(#softGlow)" transform="translate(1080, 260)">
    <circle cx="20" cy="20" r="20" fill="url(#nodeGlow1)" opacity="0.15"/>
    <circle cx="20" cy="20" r="16" fill="#1a1a2e" stroke="#e85d04" stroke-width="1.5"/>
    <text x="20" y="25" text-anchor="middle" fill="#e85d04" font-size="14">🔗</text>
  </g>

  <!-- === CENTER: AI BRAIN HUB === -->
  <g filter="url(#softGlow)" transform="translate(700, 360)">
    <circle cx="40" cy="40" r="48" fill="url(#nodeGlow1)" opacity="0.1"/>
    <circle cx="40" cy="40" r="35" fill="#0d1117" stroke="#e85d04" stroke-width="2"/>
    <circle cx="40" cy="40" r="35" fill="none" stroke="#e85d04" stroke-width="0.5" opacity="0.5">
      <animate attributeName="r" from="35" to="45" dur="2s" repeatCount="indefinite" values="35;45;35"/>
      <animate attributeName="opacity" from="0.5" to="0" dur="2s" repeatCount="indefinite" values="0.5;0;0.5"/>
    </circle>
    <!-- AI brain chip icon -->
    <text x="40" y="36" text-anchor="middle" fill="#e85d04" font-size="20" font-weight="bold">🤖</text>
    <text x="40" y="54" text-anchor="middle" fill="#fb923c" font-size="9" font-weight="600" font-family="monospace">AI</text>
  </g>

  <!-- === BOTTOM ROW: CAPABILITY NODES === -->
  <!-- Tool Calling -->
  <g filter="url(#softGlow)" transform="translate(380, 560)">
    <rect x="0" y="0" width="44" height="44" rx="12" fill="#1a1a2e" stroke="#e85d04" stroke-width="1.5"/>
    <text x="22" y="20" text-anchor="middle" fill="#e85d04" font-size="12">⚡</text>
    <text x="22" y="34" text-anchor="middle" fill="#fb923c" font-size="8" font-family="monospace">Tools</text>
  </g>

  <!-- Knowledge Base -->
  <g filter="url(#softGlow)" transform="translate(680, 560)">
    <rect x="0" y="0" width="44" height="44" rx="12" fill="#1a1a2e" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="22" y="20" text-anchor="middle" fill="#3b82f6" font-size="12">📚</text>
    <text x="22" y="34" text-anchor="middle" fill="#60a5fa" font-size="8" font-family="monospace">RAG</text>
  </g>

  <!-- Analytics -->
  <g filter="url(#softGlow)" transform="translate(980, 560)">
    <rect x="0" y="0" width="44" height="44" rx="12" fill="#1a1a2e" stroke="#22c55e" stroke-width="1.5"/>
    <text x="22" y="20" text-anchor="middle" fill="#22c55e" font-size="12">📊</text>
    <text x="22" y="34" text-anchor="middle" fill="#4ade80" font-size="8" font-family="monospace">Stats</text>
  </g>

  <!-- === DECORATIVE ELEMENTS === -->
  <!-- Floating data packets (small dots moving along lines) -->
  <g>
    <circle r="3" fill="#e85d04" opacity="0.8">
      <animateMotion dur="4s" repeatCount="indefinite" path="M 280 180 Q 400 140 500 200"/>
    </circle>
    <circle r="3" fill="#3b82f6" opacity="0.8">
      <animateMotion dur="5s" repeatCount="indefinite" path="M 500 200 Q 620 260 700 220"/>
    </circle>
    <circle r="3" fill="#22c55e" opacity="0.8">
      <animateMotion dur="3.5s" repeatCount="indefinite" path="M 700 220 Q 800 180 900 250"/>
    </circle>
    <circle r="3" fill="#a855f7" opacity="0.8">
      <animateMotion dur="4.5s" repeatCount="indefinite" path="M 900 250 Q 1020 320 1100 280"/>
    </circle>
  </g>

  <!-- Decorative gear in background -->
  <g transform="translate(120, 600)" opacity="0.04">
    <circle cx="40" cy="40" r="30" fill="none" stroke="#fff" stroke-width="2"/>
    <path d="M 40 5 L 43 15 L 53 18 L 48 27 L 55 35 L 46 38 L 42 48 L 32 45 L 25 52 L 22 43 L 13 40 L 18 31 L 12 23 L 22 20 L 27 10 Z" fill="#fff"/>
  </g>

  <g transform="translate(1200, 100)" opacity="0.04">
    <circle cx="40" cy="40" r="30" fill="none" stroke="#fff" stroke-width="2"/>
    <path d="M 40 5 L 43 15 L 53 18 L 48 27 L 55 35 L 46 38 L 42 48 L 32 45 L 25 52 L 22 43 L 13 40 L 18 31 L 12 23 L 22 20 L 27 10 Z" fill="#fff"/>
  </g>

  <!-- Subtle particles -->
  <g opacity="0.15">
    <circle cx="150" cy="300" r="1.5" fill="#fff"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="450" cy="100" r="1" fill="#fb923c"><animate attributeName="opacity" values="0.4;0.8;0.4" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="800" cy="150" r="1.5" fill="#60a5fa"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="1050" cy="400" r="1" fill="#4ade80"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="550" cy="500" r="1.2" fill="#c084fc"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="1300" cy="200" r="1" fill="#fff"><animate attributeName="opacity" values="0.3;0.6;0.3" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="700" r="1.5" fill="#60a5fa"><animate attributeName="opacity" values="0.2;0.5;0.2" dur="3.5s" repeatCount="indefinite"/></circle>
  </g>
</svg>
